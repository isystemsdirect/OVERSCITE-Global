utcbGovernance:
  fbs_doctrine: "FBS_OVERSCITE_UNIVERSAL_PRECISION_ARCHITECTURE"
  architecture: "SCINGULAR"
  spec_version: "1.0.0"

  runtime_injection:
    enabled: true
    input_formats: ["JSON", "YAML"]
    injection_sources:
      - type: "API"
        protocol: "HTTPS"
        secure: true
      - type: "Memory"
    validation:
      schema_ref: "utcb_v1_schema.json"
      require_version: true
      signature:
        algorithm: "RSA-SHA256"
        public_key_ref: "DefaultSignatureKey"

  cryptographic_audit:
    hash_algorithm: "SHA-256"
    chain:
      genesis: "GENESIS"
      prev_hash_field: "prev_hash"
      current_hash_field: "current_hash"
    tamper_detection: true
    replay_detection: true
    enforce_append_only: true

  risk_tier_propagation:
    use_numeric_scoring: true
    metrics:
      structural:
        weight: 0.4
        description: "Structural integrity score (0-100)"
      thermal:
        weight: 0.3
        description: "Thermal system score (0-100)"
      electrical:
        weight: 0.3
        description: "Electrical system score (0-100)"
    scoring:
      method: "weighted_sum"
      max_score: 100
    tiers:
      - name: "GREEN"
        max_score: 25
      - name: "YELLOW"
        max_score: 50
      - name: "ORANGE"
        max_score: 75
      - name: "RED"
        max_score: 100
    tolerance_mapping:
      low: "GREEN"
      moderate: "YELLOW"
      high: "ORANGE"
    escalation_triggers:
      structural: 0.8
      electrical: 0.9

  pipeline:
    - name: "load_config"
      action: "runtime_inject"
    - name: "validate_schema"
      action: "schema_validate"
      schema_ref: "utcb_v1_schema.json"
    - name: "verify_signature"
      action: "crypto_verify"
    - name: "append_audit_hash"
      action: "hash_chain_append"
    - name: "calculate_risk_tier"
      action: "risk_score_compute"
    - name: "store_report"
      action: "append_only_store"